# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lapdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lapuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lappassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# W3ID OIDC Configuration (OAuth2 Resource Server)
spring.security.oauth2.resourceserver.opaquetoken.introspection-uri=https://preprod.login.w3.ibm.com/v1.0/endpoint/default/introspect
spring.security.oauth2.resourceserver.opaquetoken.client-id=${W3ID_CLIENT_ID:ZjEzNGEwMGItNDAzYS00}
spring.security.oauth2.resourceserver.opaquetoken.client-secret=${W3ID_CLIENT_SECRET:YmVhNGMxOWMtMzNlZC00}
w3id.userinfo-uri=https://preprod.login.w3.ibm.com/v1.0/endpoint/default/userinfo

# Logging Configuration
logging.level.com.lap=DEBUG
logging.level.org.springframework.security=DEBUG

# Application Configuration
spring.application.name=lap-backend

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always

# File Storage Configuration
file.storage.path=./uploads
file.storage.max-file-size=52428800
file.storage.max-image-size=10485760
