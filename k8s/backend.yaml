apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-data
  namespace: cic-togive-dev
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ibmc-file-gold-gid
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: cic-togive-dev
type: Opaque
stringData:
  JWT_SECRET: change-me-to-a-secure-64-char-minimum-secret-key-for-production-use
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: backend
  namespace: cic-togive-dev
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: backend
  namespace: cic-togive-dev
spec:
  output:
    to:
      kind: ImageStreamTag
      name: backend:latest
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.prod
  triggers: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cic-togive-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: image-registry.openshift-image-registry.svc:5000/cic-togive-dev/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgresql:5432/lapdb
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
            - name: FILE_STORAGE_PATH
              value: /app/uploads
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-data
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cic-togive-dev
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
