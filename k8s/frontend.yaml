apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: frontend
  namespace: cic-togive-dev
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: frontend
  namespace: cic-togive-dev
spec:
  output:
    to:
      kind: ImageStreamTag
      name: frontend:latest
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.prod
      buildArgs:
        - name: VITE_API_URL
          value: /api
  triggers: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cic-togive-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: image-registry.openshift-image-registry.svc:5000/cic-togive-dev/frontend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cic-togive-dev
spec:
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: cic-togive
  namespace: cic-togive-dev
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  host: cic-togive.cic-openshift-cluster-84d63e86d4736aa154ba7e293148b17a-0000.eu-de.containers.appdomain.cloud
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: frontend
    weight: 100
  port:
    targetPort: 8080
